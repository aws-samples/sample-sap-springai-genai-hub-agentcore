spring.application.name=sap-execute-format-agent
spring.threads.virtual.enabled=true

server.port=9092

# Agent base URL for AgentCard (overridden at deploy time via env var)
agent.base-url=http://localhost:${server.port}

logging.level.com.example.sapexecformat=DEBUG
logging.level.org.springframework.ai=INFO

management.endpoints.web.exposure.include=health,info

# Request body size limit (1MB) — prevents oversized payloads from consuming memory
server.tomcat.max-http-post-size=1048576
server.tomcat.max-swallow-size=1048576
