spring.application.name=mcp-tools-agent
spring.threads.virtual.enabled=true

server.port=9094

# Agent base URL for AgentCard (overridden at deploy time via env var)
agent.base-url=http://localhost:${server.port}

logging.level.com.example.mcptools=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.ai.mcp=INFO

management.endpoints.web.exposure.include=health,info

# MCP Client: AWS Knowledge Base
spring.ai.mcp.client.request-timeout=30s
# Suppress spurious startup noise from the MCP client connecting to knowledge-mcp.global.api.aws.
# The server returns a 200 with a streaming/SSE body that Reactor Netty cannot decode during the
# initial SSE probe — the MCP tools function correctly once invoked.
logging.level.io.modelcontextprotocol=ERROR
logging.level.org.springframework.mcp=ERROR
spring.ai.mcp.client.streamable-http.connections.awsknowledge.endpoint=/
spring.ai.mcp.client.streamable-http.connections.awsknowledge.url=https://knowledge-mcp.global.api.aws

# MCP Client: Product Catalog via AgentCore Gateway
# Connection activates when PRODUCTCATALOG_GATEWAY_URL env var is set at deploy time.
# When not set, Spring Boot ignores the empty URL and only the AWS Knowledge connection is used.
spring.ai.mcp.client.streamable-http.connections.productcatalog.url=${PRODUCTCATALOG_GATEWAY_URL:}
spring.ai.mcp.client.streamable-http.connections.productcatalog.endpoint=/mcp

# === Gateway OAuth2 (client_credentials flow for JWT auth to the gateway) ===
# Activates when PRODUCTCATALOG_GATEWAY_CLIENT_ID env var is set at deploy time.
spring.security.oauth2.client.registration.gateway.client-id=${PRODUCTCATALOG_GATEWAY_CLIENT_ID:}
spring.security.oauth2.client.registration.gateway.client-secret=${PRODUCTCATALOG_GATEWAY_CLIENT_SECRET:}
spring.security.oauth2.client.registration.gateway.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway.scope=${PRODUCTCATALOG_GATEWAY_SCOPE:gateway-api/invoke}
spring.security.oauth2.client.provider.gateway.token-uri=${PRODUCTCATALOG_GATEWAY_TOKEN_ENDPOINT:}

# Request body size limit (1MB) — prevents oversized payloads from consuming memory
server.tomcat.max-http-post-size=1048576
server.tomcat.max-swallow-size=1048576
