spring.application.name=orchestrator-agent
spring.threads.virtual.enabled=true

server.port=9090

# Spring MVC default async timeout is 30s — not enough for multi-agent LLM chains.
# Set to 5 minutes; the A2AClient read timeout (120s) is the effective bound in practice.
spring.mvc.async.request-timeout=300s

logging.level.com.example.orchestrator=DEBUG
logging.level.org.springframework.ai=INFO

management.endpoints.web.exposure.include=health,info

# ===================================================================
# A2A Worker Agent URLs
# Override with env vars at deploy time:
#   A2A_AGENTS_SAP-QUERY-AGENT_URL, A2A_AGENTS_SAP-EXECUTE-FORMAT-AGENT_URL, etc.
# ===================================================================
a2a.agents.sap-query-agent.url=http://localhost:9091
a2a.agents.sap-execute-format-agent.url=http://localhost:9092
a2a.agents.date-weather-agent.url=http://localhost:9093
a2a.agents.mcp-tools-agent.url=http://localhost:9094

# Request body size limit (1MB) — prevents oversized payloads from consuming memory
server.tomcat.max-http-post-size=1048576
server.tomcat.max-swallow-size=1048576
