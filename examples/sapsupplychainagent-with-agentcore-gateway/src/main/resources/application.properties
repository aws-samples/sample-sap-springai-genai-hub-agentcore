spring.application.name=sapaiagent
spring.threads.virtual.enabled=true

server.port=9090

logging.level.org.springframework.ai=DEBUG
logging.level.com.example.sapaiagent=DEBUG

# MCP Client Configuration
spring.ai.mcp.client.request-timeout=30s
logging.level.org.springframework.ai.mcp=INFO
# Suppress spurious startup noise from the MCP client connecting to knowledge-mcp.global.api.aws.
# The server returns a 200 with a streaming/SSE body that Reactor Netty cannot decode during the
# initial SSE probe — the MCP tools function correctly once invoked.
logging.level.io.modelcontextprotocol=ERROR
logging.level.org.springframework.mcp=ERROR
spring.ai.mcp.client.streamable-http.connections.awsknowledge.endpoint=/
spring.ai.mcp.client.streamable-http.connections.awsknowledge.url=https://knowledge-mcp.global.api.aws

# === Observability ===
# OTEL tracing is handled entirely by the ADOT Java agent at runtime.
# No Micrometer/Spring Boot tracing config needed — the agent auto-instruments
# HTTP calls and exports spans to the AgentCore sidecar collector.

# Expose health endpoint for AgentCore health checks
management.endpoints.web.exposure.include=health,info

# === AgentCore Memory ===
# Memory ID is injected via AGENTCORE_MEMORY_MEMORY_ID env var at deployment.
# STM: conversation history persisted to AgentCore Memory (replaces InMemoryChatMemoryRepository).
# LTM: auto-discovers semantic + user preference strategies from the memory resource.
# When AGENTCORE_MEMORY_MEMORY_ID is not set, the @ConditionalOnProperty guard in the
# spring-ai-agentcore-memory library skips auto-configuration and Spring AI falls back
# to InMemoryChatMemoryRepository (local dev mode).
agentcore.memory.long-term.auto-discovery=true
agentcore.memory.long-term.namespace.auto-register=true

# Product Catalog via AgentCore Gateway (gateway converts REST API to MCP tools)
spring.ai.mcp.client.streamable-http.connections.productcatalog.url=${PRODUCT_CATALOG_GATEWAY_URL}
spring.ai.mcp.client.streamable-http.connections.productcatalog.endpoint=/mcp

# === Gateway OAuth2 (client_credentials flow for JWT auth to the gateway) ===
spring.security.oauth2.client.registration.gateway.client-id=${GATEWAY_CLIENT_ID}
spring.security.oauth2.client.registration.gateway.client-secret=${GATEWAY_CLIENT_SECRET}
spring.security.oauth2.client.registration.gateway.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway.scope=${GATEWAY_SCOPE:gateway-api/invoke}
spring.security.oauth2.client.provider.gateway.token-uri=${GATEWAY_TOKEN_ENDPOINT}